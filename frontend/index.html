<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURO-SNAKE // SYS.OP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'VT323', monospace;
      background-color: #050505;
      color: #00ffff;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    /* CRT Scanline Effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.2) 50%,
        rgba(0, 0, 0, 0.2)
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 50;
    }

    /* CRT Flicker */
    @keyframes flicker {
      0% { opacity: 0.95; }
      5% { opacity: 0.85; }
      10% { opacity: 0.95; }
      15% { opacity: 1; }
      100% { opacity: 1; }
    }
    .crt-flicker {
      animation: flicker 0.15s infinite;
    }

    /* Glitch Text Effect */
    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050505;
    }
    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 #ff00ff;
      clip: rect(24px, 550px, 90px, 0);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
    }
    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 #00ffff;
      clip: rect(85px, 550px, 140px, 0);
      animation: glitch-anim 2.5s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim {
      0% { clip: rect(15px, 9999px, 94px, 0); transform: skew(0.8deg); }
      5% { clip: rect(70px, 9999px, 71px, 0); transform: skew(0.2deg); }
      10% { clip: rect(10px, 9999px, 92px, 0); transform: skew(0.6deg); }
      15% { clip: rect(89px, 9999px, 14px, 0); transform: skew(0.1deg); }
      20% { clip: rect(12px, 9999px, 65px, 0); transform: skew(0.9deg); }
      25% { clip: rect(76px, 9999px, 34px, 0); transform: skew(0.4deg); }
      30% { clip: rect(23px, 9999px, 87px, 0); transform: skew(0.7deg); }
      35% { clip: rect(90px, 9999px, 12px, 0); transform: skew(0.3deg); }
      40% { clip: rect(45px, 9999px, 56px, 0); transform: skew(0.5deg); }
      45% { clip: rect(67px, 9999px, 23px, 0); transform: skew(0.8deg); }
      50% { clip: rect(34px, 9999px, 78px, 0); transform: skew(0.2deg); }
      55% { clip: rect(81px, 9999px, 45px, 0); transform: skew(0.6deg); }
      60% { clip: rect(19px, 9999px, 90px, 0); transform: skew(0.1deg); }
      65% { clip: rect(56px, 9999px, 32px, 0); transform: skew(0.9deg); }
      70% { clip: rect(98px, 9999px, 11px, 0); transform: skew(0.4deg); }
      75% { clip: rect(21px, 9999px, 67px, 0); transform: skew(0.7deg); }
      80% { clip: rect(74px, 9999px, 89px, 0); transform: skew(0.3deg); }
      85% { clip: rect(43px, 9999px, 21px, 0); transform: skew(0.5deg); }
      90% { clip: rect(87px, 9999px, 54px, 0); transform: skew(0.8deg); }
      95% { clip: rect(11px, 9999px, 98px, 0); transform: skew(0.2deg); }
      100% { clip: rect(65px, 9999px, 43px, 0); transform: skew(0.6deg); }
    }
    @keyframes glitch-anim-2 {
      0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.5deg); }
      5% { clip: rect(52px, 9999px, 74px, 0); transform: skew(0.1deg); }
      10% { clip: rect(79px, 9999px, 85px, 0); transform: skew(0.8deg); }
      15% { clip: rect(75px, 9999px, 5px, 0); transform: skew(0.3deg); }
      20% { clip: rect(67px, 9999px, 61px, 0); transform: skew(0.6deg); }
      25% { clip: rect(14px, 9999px, 79px, 0); transform: skew(0.2deg); }
      30% { clip: rect(1px, 9999px, 66px, 0); transform: skew(0.9deg); }
      35% { clip: rect(86px, 9999px, 30px, 0); transform: skew(0.4deg); }
      40% { clip: rect(23px, 9999px, 98px, 0); transform: skew(0.7deg); }
      45% { clip: rect(85px, 9999px, 72px, 0); transform: skew(0.1deg); }
      50% { clip: rect(71px, 9999px, 75px, 0); transform: skew(0.5deg); }
      55% { clip: rect(2px, 9999px, 48px, 0); transform: skew(0.8deg); }
      60% { clip: rect(30px, 9999px, 16px, 0); transform: skew(0.3deg); }
      65% { clip: rect(59px, 9999px, 50px, 0); transform: skew(0.6deg); }
      70% { clip: rect(41px, 9999px, 62px, 0); transform: skew(0.2deg); }
      75% { clip: rect(2px, 9999px, 82px, 0); transform: skew(0.9deg); }
      80% { clip: rect(47px, 9999px, 73px, 0); transform: skew(0.4deg); }
      85% { clip: rect(3px, 9999px, 27px, 0); transform: skew(0.7deg); }
      90% { clip: rect(26px, 9999px, 55px, 0); transform: skew(0.1deg); }
      95% { clip: rect(42px, 9999px, 97px, 0); transform: skew(0.5deg); }
      100% { clip: rect(38px, 9999px, 49px, 0); transform: skew(0.8deg); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #00ffff; }
    ::-webkit-scrollbar-thumb { background: #ff00ff; }
    ::-webkit-scrollbar-thumb:hover { background: #00ffff; }
  </style>
  </head>
<body>
  <div class="scanlines"></div>
  <div id="root" class="crt-flicker w-full h-screen flex items-center justify-center p-4"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
